<!DOCTYPE html>
<style>
  :root {
    color-scheme: light only;
  }
  @media (prefers-color-scheme: dark) {
    body, html {
      background-color: #ffffff !important;
      color: #000000 !important;
    }
  }
</style>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Bioskinetics</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; color: #2c2c2a; background: #fafaf8; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Navigation ── */
    #bio-nav { display: flex; align-items: center; justify-content: space-between; background: #000; padding: 0 2rem; height: 80px; width: 100%; box-sizing: border-box; }
    .bio-nav-logo img { height: 52px; width: auto; display: block; }
    .bio-nav-links { list-style: none; display: flex; align-items: center; gap: 2rem; margin: 0; padding: 0; }
    .bio-nav-links a { font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; text-decoration: none; transition: color 0.15s; }
    .bio-nav-links a:hover { color: #fade4b; }
    .bio-nav-icons { display: flex; align-items: center; gap: 1.25rem; }
    .bio-nav-icon { color: #fff; display: flex; align-items: center; transition: color 0.15s; }
    .bio-nav-icon:hover { color: #fade4b; }
    .bio-nav-icon svg { width: 24px; height: 24px; }

    /* ── Page ── */
    .reset-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .reset-card { background: #fff; border: 1px solid #ece8f0; border-radius: 20px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; }
    .reset-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #beadc5; margin-bottom: 0.5rem; }
    .reset-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #b2a254; margin-bottom: 0.4rem; line-height: 1.1; }
    .reset-sub { font-size: 14px; font-weight: 300; color: #9a9895; margin-bottom: 1.75rem; }
    .reset-divider { width: 40px; height: 1.5px; background: linear-gradient(to right, #beadc5, transparent); border: none; margin-bottom: 1.75rem; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #9a9895; }
    .pw-wrap { position: relative; display: flex; align-items: center; }
    .pw-wrap input { font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 300; color: #e0e0e0; background: #3a3835; border: none; border-radius: 8px; padding: 13px 44px 13px 16px; outline: none; transition: background 0.2s; width: 100%; }
    .pw-wrap input:focus { background: #444240; }
    .pw-wrap input::placeholder { color: #888; }
    .pw-toggle { position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: #888; padding: 0; display: flex; align-items: center; }
    .reset-btn { width: 100%; background: #fade4b; color: #2c2c2a; font-family: 'Jost', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; border: none; border-radius: 6px; padding: 16px 24px; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
    .reset-btn:hover { background: #f5d535; }
    .reset-btn:disabled { background: #e0e0e0; cursor: not-allowed; }
    #msg { font-size: 13px; font-weight: 300; margin-top: 1rem; min-height: 1.2em; text-align: center; }
    #msg.error { color: #c0392b; }
    #msg.success { color: #2c7a4b; }

    /* ── Footer ── */
    #bio-footer { background: #000; color: #fff; margin-top: 2rem; }
    .bio-footer-bottom { padding: 1.25rem 2rem; text-align: center; font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 300; color: #666; }
  </style>
</head>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>

  <script>
    document.getElementById('bio-footer-year').textContent = new Date().getFullYear();

    function togglePw(id, btn) {
      var inp = document.getElementById(id);
      if (!inp) return;
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      } else {
        inp.type = 'password';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    }

    async function handleReset() {
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('reset-btn');
      msg.className = '';
      if (!pw || pw.length < 6) { msg.textContent = 'Password must be at least 6 characters.'; msg.className = 'error'; return; }
      if (pw !== pw2) { msg.textContent = 'Passwords do not match.'; msg.className = 'error'; return; }
      btn.disabled = true;
      btn.textContent = 'Updating...';
      const { error } = await sb.auth.updateUser({ password: pw });
      if (error) { msg.textContent = 'Error: ' + error.message; msg.className = 'error'; btn.disabled = false; btn.textContent = 'Update Password'; return; }
      msg.textContent = '✓ Password updated successfully!';
      msg.className = 'success';
      document.getElementById('signin-btn').style.display = 'block';
      btn.style.display = 'none';
    }
