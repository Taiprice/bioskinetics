<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Bioskinetics</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Jost', sans-serif; color: #2c2c2a; background: #fafaf8; min-height: 100vh; display: flex; flex-direction: column; }



    /* Page */
    .reset-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
    .reset-card { background: #faf9f7; border: 0.5px solid rgba(190,173,197,0.4); border-radius: 16px; padding: 2.75rem 2.5rem; width: 100%; max-width: 420px; }
    .reset-eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #beadc5; margin-bottom: 0.5rem; }
    .reset-title { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 600; color: #2c2c2a; margin-bottom: 0.4rem; }
    .reset-sub { font-size: 14px; font-weight: 300; color: #9a9895; margin-bottom: 1.75rem; line-height: 1.6; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #9a9895; }
    .form-group input { font-family: 'Jost', sans-serif; font-size: 15px; font-weight: 300; color: #e0e0e0; background: #3a3835; border: none; border-radius: 8px; padding: 13px 16px; outline: none; transition: background 0.2s; width: 100%; }
    .form-group input:focus { background: #444240; }
    .form-group input::placeholder { color: #888; font-weight: 300; }
    .pw-wrap { position: relative; display: flex; align-items: center; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle { position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: #888; padding: 0; display: flex; align-items: center; }
    .reset-btn { width: 100%; background: #fade4b; color: #2c2c2a; font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; border: none; border-radius: 4px; padding: 16px 24px; cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 0.5rem; }
    .reset-btn:hover { background: #f5d535; }
    .reset-btn:active { transform: scale(0.98); }
    .reset-btn:disabled { background: #e0e0e0; color: #999; cursor: not-allowed; transform: none; }
    .msg { font-size: 13px; border-radius: 6px; padding: 10px 14px; margin-bottom: 14px; display: none; }
    .msg-error { color: #c0392b; background: #fdf0ee; border: 1px solid #f5c6c0; }
    .msg-success { color: #2c7a4b; background: #edf7f1; border: 1px solid #a8dfc0; }
    .pw-strength { height: 3px; border-radius: 999px; background: #e8e3ee; margin-top: 6px; overflow: hidden; }
    .pw-strength-bar { height: 100%; width: 0%; border-radius: 999px; transition: width 0.3s, background 0.3s; }
    .back-link { display: block; text-align: center; margin-top: 1.25rem; font-size: 12px; font-weight: 400; color: #2c2c2a; text-decoration: none; cursor: pointer; }
    .back-link:hover { color: #beadc5; }

    /* Invalid token state */
    .invalid-wrap { text-align: center; }
    .invalid-wrap p { font-size: 15px; font-weight: 300; color: #9a9895; margin-bottom: 1.5rem; line-height: 1.7; }
    .invalid-wrap a { display: inline-block; background: #fade4b; color: #2c2c2a; font-family: 'Jost', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; text-decoration: none; border-radius: 4px; padding: 14px 28px; }
  </style>
</head>
<body>

  <div class="reset-wrap">
    <div class="reset-card" id="reset-card">
      <p class="reset-eyebrow">Account Security</p>
      <h1 class="reset-title">Set New Password</h1>
      <p class="reset-sub" id="reset-sub">Choose a strong password for your Bioskinetics account.</p>

      <div class="msg msg-error" id="reset-error"></div>
      <div class="msg msg-success" id="reset-success"></div>

      <div id="reset-form">
        <div class="form-group">
          <label>New Password</label>
          <div class="pw-wrap">
            <input type="password" id="new-password" placeholder="Min. 6 characters" oninput="updateStrength(this.value)" />
            <button type="button" class="pw-toggle" onclick="bioTogglePassword('new-password', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength"><div class="pw-strength-bar" id="strength-bar"></div></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="confirm-password" placeholder="Re-enter password" />
            <button type="button" class="pw-toggle" onclick="bioTogglePassword('confirm-password', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button class="reset-btn" id="reset-btn" onclick="handleResetPassword()">Update Password</button>
      </div>

      <a class="back-link" href="/my-account.html">← Back to My Account</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://huojeekaztmuarwtnyib.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1b2plZWthenRtdWFyd3RueWliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODA3OTQsImV4cCI6MjA5NDk1Njc5NH0.XKQnhHYQ0E8pjfgrUFOiIqNo7gakJvpYb0HKMtiP4eQ';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Supabase sends the token in the URL hash — exchange it for a session
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Token is valid, user can now set a new password — form is already visible
      }
    });

    async function handleResetPassword() {
      const newPw = document.getElementById('new-password').value;
      const confirmPw = document.getElementById('confirm-password').value;
      const errorEl = document.getElementById('reset-error');
      const successEl = document.getElementById('reset-success');
      errorEl.style.display = 'none';
      successEl.style.display = 'none';

      if (!newPw || !confirmPw) {
        errorEl.textContent = 'Please fill in both fields.';
        errorEl.style.display = 'block';
        return;
      }
      if (newPw.length < 6) {
        errorEl.textContent = 'Password must be at least 6 characters.';
        errorEl.style.display = 'block';
        return;
      }
      if (newPw !== confirmPw) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.textContent = 'Updating…';

      const { error } = await sb.auth.updateUser({ password: newPw });

      if (error) {
        errorEl.textContent = error.message;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Update Password';
        return;
      }

      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('reset-sub').style.display = 'none';
      successEl.textContent = '✓ Password updated! Redirecting you to your account…';
      successEl.style.display = 'block';
      setTimeout(() => { window.location.href = '/my-account.html'; }, 2500);
    }

    function updateStrength(val) {
      const bar = document.getElementById('strength-bar');
      let score = 0;
      if (val.length >= 6) score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#27ae60'];
      const widths = ['20%', '40%', '60%', '80%', '100%'];
      bar.style.width = val.length === 0 ? '0%' : widths[score - 1] || '20%';
      bar.style.background = val.length === 0 ? 'transparent' : colors[score - 1] || '#e74c3c';
    }

    function bioTogglePassword(inputId, btn) {
      const inp = document.getElementById(inputId);
      if (!inp) return;
      if (inp.type === 'password') {
        inp.type = 'text';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      } else {
        inp.type = 'password';
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      }
    }
  </script>
</body>
</html>
